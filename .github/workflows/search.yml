name: Upload Google Trending Now Search to Google BigQuery

on:
  schedule:
    - cron: '0 */4 * * *'   # Runs every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get_and_upload_trend_data:
    runs-on: ubuntu-latest
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set up Google Cloud credentials
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' # Replace with the name of your GitHub Actions secret

    - name: Run your script
      run: |
        python search.py

    - name: Update and commit search.py
      run: |
        # Add or update a timestamp comment at top of file
        sed -i "1s|^# Last run:.*|# Last run: $(date -u)|; 1t; 1i # Last run: $(date -u)" search.py

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add search.py
        git commit -m "Auto update search.py timestamp [skip ci]" || echo "No changes"
        git pull --rebase origin main
        git push
