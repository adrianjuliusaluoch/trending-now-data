name: Upload Google Jobs Search to Google BigQuery
on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
concurrency:
  group: upload-google-jobs-bq
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  get_and_upload_jobs_data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY1 }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Set up Google Cloud credentials
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}'
    - name: Run your script
      run: python jobs.py
    - name: Update and commit jobs.py
      run: |
        sed -i "1s|^# Last run:.*|# Last run: $(date -u)|; 1t; 1i # Last run: $(date -u)" jobs.py
        git config --global user.name "adrianjuliusaluoch"
        git config --global user.email "adrianjuliusaluoch@gmail.com"
        git add jobs.py
        git commit -m "Keep workflow alive [skip ci]" || echo "No changes to commit"
        git pull --rebase origin main
        git push
      continue-on-error: true
